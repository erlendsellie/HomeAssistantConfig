
- alias: AdjustLightProfile
  trigger:
  - platform: state
    entity_id: input_select.light_profile
  condition:
    condition: or
    conditions:
    - condition: state
      entity_id: light.tv
      state: 'on'
    - condition: state
      entity_id: light.bed
      state: 'on'      
  action:
  - service: light.turn_on
    data_template:
      entity_id: light.tv, light.bed
      profile: '{{ trigger.to_state.state }}'
      brightness_pct: '{{ states.input_number.brightness.state | int }}'


