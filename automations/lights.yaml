- alias: TurnOnLightsWhenWeGetHome
  trigger:
    - platform: state
      entity_id: input_select.alarm
      to: 'Disarm'
  condition:
  # Somewhat before the sun sets.
    - condition: template
      value_template: "{{ states.sensor.illuminance_livingroom.state | float < 40}}"
  action:
    - service: homeassistant.turn_on
      entity_id: script.lightson

- alias: AdjustUteSpotter
  trigger:
    - platform: state
      entity_id: sun.sun
  action:
    - service: >
        {% if states('sun.sun') == 'Above horizon' %}
          light.turn_off
        {% else %}
          climate.turn_on
        {% endif %}
      entity_id: light.utespotter


- alias: TurnOnDriveWayLight 
  mode: restart #parallel single queued
  trigger:
  - platform: state
    entity_id: binary_sensor.motion_driveway
    to: 'on'
  - platform: state
    entity_id: binary_sensor.hoveddor
    to: 'on'
  - platform: state
    entity_id: cover.garage_door
    to: 'on'
  condition:
  # Somewhat before the sun sets.
    - condition: template
      value_template: "{{ states.sun.sun.attributes.elevation < 0}}"
  action:
  - service: light.turn_on
    entity_id: 
      - light.driveway
  - wait_for_trigger:
      - platform: state
        entity_id: binary_sensor.motion_driveway
        to: 'off'
        for:
          minutes: 15
      - platform: state
        entity_id: light.driveway
        to: 'on'
        for:
          minutes: 60
      - platform: state
        entity_id: light.driveway
        to: 'on'
        for:
          minutes: 30
      - platform: state
        entity_id: light.driveway
        to: 'on'
        for:
          minutes: 45                    
    timeout: '00:30:00'
    continue_on_timeout: false
  - condition: state
    entity_id: binary_sensor.motion_driveway
    state: 'off'
    for:
      minutes: 10
  - service: light.turn_off
    entity_id: light.driveway