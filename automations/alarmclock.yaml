
- alias: AlarmTime
  trigger:
      platform: template
      value_template: >- 
          {{ ((((as_timestamp(now()) + (15*60) | int)) | timestamp_custom("%Y-%m-%dT%H:%M+0200"))
          == 
          states.sensor.next_alarm.state) 
          and
          states.sensor.date_time.state == states.sensor.date_time.state
          and false}}
  action:
    - service: script.turn_on
      entity_id: script.notify
      data_template:
        variables:
          title: Phone Alarm notification successfull!
          message: Phone Alarm notification successfull!
                  #{{ (((as_timestamp(now()) | int) + 1*60) | timestamp_custom("%Y-%m-%dT%H:%M+0200"))
