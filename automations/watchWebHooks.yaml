- alias: 'klokke1'
  trigger:
    platform: webhook
    webhook_id: klokke1
  condition:
  - condition: template
    value_template: "{{ states.group.erlend.state == 'home' and states.binary_sensor.motion_downstairs_office.state == 'off'}}"
  action:
    - choose:
      - conditions:
          - condition: state
            entity_id: input_boolean.easleep
            state: 'off'
        sequence:
        - service: media_player.toggle
          entity_id: media_player.nvidia_shield          
        - service: media_player.toggle
          entity_id: media_player.tv_stua
      - conditions:
        - condition: state
          entity_id: input_boolean.easleep
          state: 'on'
        - condition: state
          entity_id: media_player.tv_soverommet
          state: 'off'
        sequence:
        - service: media_player.turn_on
          entity_id: media_player.bedroom
      - conditions:
        - condition: state
          entity_id: input_boolean.easleep
          state: 'on'
        - condition: state
          entity_id: media_player.tv_soverommet
          state: 'on'
        sequence:
        - service: media_player.turn_off
          entity_id: media_player.tv_soverommet          

