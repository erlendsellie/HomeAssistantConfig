#Slå av lys
- alias: 'klokke12'
  trigger:
    platform: webhook
    webhook_id: klokke12
  condition:
  - condition: template
    value_template: "{{ states.group.erlend.state == 'home' and states.input_boolean.easleep.state == 'off'}}"
  action:
    - choose:
      - conditions:
          - condition: state
            entity_id: binary_sensor.motion_downstairs_office
            state: 'on'
        sequence:
        - service: light.turn_off
          entity_id: light.office_light, light.play
      - conditions:
        - condition: state
          entity_id: binary_sensor.motion_downstairs_office
          state: 'off'
        sequence:    
        - service: light.turn_off
          entity_id: light.tvsone, light.peis    
  #- service: light.turn_off
    #entity_id: light.kjokkenbord    

#Slå på lys
- alias: 'klokke9'
  trigger:
    platform: webhook
    webhook_id: klokke9
  condition:
  - condition: template
    value_template: "{{ states.group.erlend.state == 'home' and states.input_boolean.easleep.state == 'off'}}"
  action:
    - choose:
      - conditions:
          - condition: state
            entity_id: binary_sensor.motion_downstairs_office
            state: 'on'
        sequence:
        - service: light.turn_on
          entity_id: light.office_light, light.play
          data_template:
            brightness_pct: '100'
      - conditions:
        - condition: state
          entity_id: binary_sensor.motion_downstairs_office
          state: 'off'
        sequence:
        - service: input_number.set_value
          data:
            entity_id: input_number.brightness
            value: 99    
        - service: input_number.set_value
          data:
            entity_id: input_number.brightness
            value: 100
        - service: light.turn_on
          entity_id: light.peis

