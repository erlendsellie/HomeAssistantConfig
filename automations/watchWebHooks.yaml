- alias: 'moreActions'
  trigger:
    platform: webhook
    webhook_id: moreactions
  condition:
  - condition: template
    value_template: "{{ states.person.erlend.state != 'Work'}}"
  action:
    - choose:
      - conditions:
          - condition: state
            entity_id: input_boolean.easleep
            state: 'on'
        sequence:
          - service: notify.mobile_app_erlend_app
            data_template:
              title: 'Turn on the blanket heater?'
              message: 'Its {{states.sensor.temp_bedroom.state}} degrees in the bedroom.'
              data:
                ttl: 0
                priority: high
                actions:
                - action: blanketoff
                  title: 'Turn off'                
                - action: blanket30min
                  title: 'Yes, 30 minutes'
                - action: blanketTVOff
                  title: 'Yes, until TV Off'
      - conditions:
        - condition: state
          entity_id: input_boolean.easleep
          state: 'off'
        sequence:
          - service: notify.mobile_app_erlend_app
            data_template:
              message: 'Actions'
              data:
                ttl: 0
                priority: high
                actions:
                  - action: togglecurtains
                    title: Toggle Curtains
                    destructive: false
                  - action: trymtoggle
                    title: Trym Asleep Toggle
                    destructive: true
                  - action: tyratoggle
                    title: Tyra Asleep Toggle
                    destructive: true
                  - action: officeheater
                    title: Office Heater
                    destructive: true



