input_text:
  telegram_ai_conversation_id:
    name: Telegram AI Conversation ID
    max: 100
    initial: "telegram_erlend"

automation:
  - id: telegram_ai_handle_text
    alias: "Telegram AI - Handle Text Messages"
    mode: queued
    max: 5
    trigger:
      - platform: event
        event_type: telegram_text
    condition:
      - condition: template
        value_template: "{{ trigger.event.data.chat_id == -5206189255 }}"
    action:
      - variables:
          user_message: "{{ trigger.event.data.text }}"
          chat_id: "{{ trigger.event.data.chat_id }}"
          ai_response: null
      - action: conversation.process
        data:
          agent_id: conversation.extended_openai_conversation
          text: "{{ user_message }}"
          conversation_id: "{{ states('input_text.telegram_ai_conversation_id') }}"
        response_variable: ai_response
        continue_on_error: true
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ ai_response is not mapping or ai_response.get('response') is not defined }}"
            sequence:
              # Auto-reset conversation to prevent corrupted state from poisoning future messages
              - action: input_text.set_value
                target:
                  entity_id: input_text.telegram_ai_conversation_id
                data:
                  value: "telegram_erlend_{{ now().timestamp() | int }}"
              - action: telegram_bot.send_message
                data:
                  target: "{{ chat_id }}"
                  parse_mode: html
                  message: "Something went wrong and I had to reset the conversation to recover. Try your request again."
        default:
          - action: input_text.set_value
            target:
              entity_id: input_text.telegram_ai_conversation_id
            data:
              value: "{{ ai_response.conversation_id }}"
          - variables:
              safe_msg: >-
                {{ ai_response.response.speech.plain.speech
                   | regex_replace('<(?!/?(?:b|i|em|strong|u|ins|s|strike|del|code|pre|a)[\s>/])', '&lt;') }}
          - action: telegram_bot.send_message
            continue_on_error: true
            data:
              target: "{{ chat_id }}"
              parse_mode: html
              disable_web_page_preview: true
              message: "{{ safe_msg }}"

  - id: telegram_ai_handle_commands
    alias: "Telegram AI - Handle Commands"
    mode: queued
    max: 5
    trigger:
      - platform: event
        event_type: telegram_command
    condition:
      - condition: template
        value_template: >
          {{ trigger.event.data.chat_id == -5206189255
             and trigger.event.data.command not in ['/garage', '/start'] }}
    action:
      - variables:
          chat_id: "{{ trigger.event.data.chat_id }}"
          command: "{{ trigger.event.data.command }}"
          args: "{{ trigger.event.data.args | default([]) | join(' ') }}"
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ command in ['/clear', '/reset'] }}"
            sequence:
              - action: input_text.set_value
                target:
                  entity_id: input_text.telegram_ai_conversation_id
                data:
                  value: "telegram_erlend_{{ now().timestamp() | int }}"
              - action: telegram_bot.send_message
                data:
                  target: "{{ chat_id }}"
                  message: "Conversation cleared."
          - conditions:
              - condition: template
                value_template: "{{ command == '/help' }}"
            sequence:
              - action: telegram_bot.send_message
                data:
                  target: "{{ chat_id }}"
                  parse_mode: html
                  message: >
                    <b>Available commands:</b>

                    /status — Full house status report
                    /clear or /reset — Clear conversation history
                    /help — This help message

                    You can also just type normally or send photos.
          - conditions:
              - condition: template
                value_template: "{{ command == '/status' }}"
            sequence:
              - variables:
                  ai_response: null
              - action: conversation.process
                data:
                  agent_id: conversation.extended_openai_conversation
                  text: >
                    Give me a full status report of the house. Include: indoor temperatures, who is home, weather outside,
                    any doors/windows open, garage status, alarm status, lights that are on, and anything else noteworthy.
                    Be thorough but concise in your signature style.
                  conversation_id: "{{ states('input_text.telegram_ai_conversation_id') }}"
                response_variable: ai_response
                continue_on_error: true
              - if:
                  - condition: template
                    value_template: "{{ ai_response is mapping and ai_response.conversation_id is defined }}"
                then:
                  - action: input_text.set_value
                    target:
                      entity_id: input_text.telegram_ai_conversation_id
                    data:
                      value: "{{ ai_response.conversation_id }}"
              - variables:
                  safe_msg: >-
                    {% if ai_response is mapping and ai_response.get('response') is defined %}
                    {{ ai_response.response.speech.plain.speech
                       | regex_replace('<(?!/?(?:b|i|em|strong|u|ins|s|strike|del|code|pre|a)[\s>/])', '&lt;') }}
                    {% else %}
                    Couldn't get the status report right now. Try again.
                    {% endif %}
              - action: telegram_bot.send_message
                continue_on_error: true
                data:
                  target: "{{ chat_id }}"
                  parse_mode: html
                  disable_web_page_preview: true
                  message: "{{ safe_msg }}"
        default:
          - variables:
              ai_response: null
          - action: conversation.process
            data:
              agent_id: conversation.extended_openai_conversation
              text: "{{ command }} {{ args }}"
              conversation_id: "{{ states('input_text.telegram_ai_conversation_id') }}"
            response_variable: ai_response
            continue_on_error: true
          - if:
              - condition: template
                value_template: "{{ ai_response is mapping and ai_response.conversation_id is defined }}"
            then:
              - action: input_text.set_value
                target:
                  entity_id: input_text.telegram_ai_conversation_id
                data:
                  value: "{{ ai_response.conversation_id }}"
          - variables:
              safe_msg: >-
                {% if ai_response is mapping and ai_response.get('response') is defined %}
                {{ ai_response.response.speech.plain.speech
                   | regex_replace('<(?!/?(?:b|i|em|strong|u|ins|s|strike|del|code|pre|a)[\s>/])', '&lt;') }}
                {% else %}
                That command didn't work. Try /help for available commands.
                {% endif %}
          - action: telegram_bot.send_message
            continue_on_error: true
            data:
              target: "{{ chat_id }}"
              parse_mode: html
              disable_web_page_preview: true
              message: "{{ safe_msg }}"

  - id: telegram_ai_handle_photo
    alias: "Telegram AI - Handle Photos"
    mode: queued
    max: 3
    trigger:
      - platform: event
        event_type: telegram_photo
    condition:
      - condition: template
        value_template: "{{ trigger.event.data.chat_id == -5206189255 }}"
    action:
      - variables:
          chat_id: "{{ trigger.event.data.chat_id }}"
          caption: "{{ trigger.event.data.caption | default('What is in this image?') }}"
      - variables:
          ai_response: null
      - action: conversation.process
        data:
          agent_id: conversation.extended_openai_conversation
          text: >
            The user sent a photo with caption: "{{ caption }}".
            I cannot see the photo directly, but describe that you're unable to process images
            sent via Telegram yet and suggest they ask about camera feeds instead.
          conversation_id: "{{ states('input_text.telegram_ai_conversation_id') }}"
        response_variable: ai_response
        continue_on_error: true
      - if:
          - condition: template
            value_template: "{{ ai_response is mapping and ai_response.conversation_id is defined }}"
        then:
          - action: input_text.set_value
            target:
              entity_id: input_text.telegram_ai_conversation_id
            data:
              value: "{{ ai_response.conversation_id }}"
      - variables:
          safe_msg: >-
            {% if ai_response is mapping and ai_response.get('response') is defined %}
            {{ ai_response.response.speech.plain.speech
               | regex_replace('<(?!/?(?:b|i|em|strong|u|ins|s|strike|del|code|pre|a)[\s>/])', '&lt;') }}
            {% else %}
            Can't process images sent via Telegram yet. Try asking about one of the security cameras instead.
            {% endif %}
      - action: telegram_bot.send_message
        continue_on_error: true
        data:
          target: "{{ chat_id }}"
          parse_mode: html
          disable_web_page_preview: true
          message: "{{ safe_msg }}"
