input_number:
  grill_temp:
    name: Steketemperatur
    initial: 80
    min: 45
    max: 90
    step: 0.5

automation:
  - id: grill_done
    alias: grill_done
    trigger:
      # template trigger if sensor.grill_1 is over input_number.grill_temp for 2 minutes
      - platform: template
        for:
          minutes: 1
        value_template: >
          {{ states('sensor.grill_1') | float(default=0) > states('input_number.grill_temp') | float(default=0) and states('sensor.grill_1') | float(default=0) < 2000 }}
      - platform: template
        for:
          minutes: 1
        value_template: >
          {{ states('sensor.grill_2') | float(default=0) > states('input_number.grill_temp') | float(default=0) and states('sensor.grill_2') | float(default=0) < 2000}}
    action:
      - service: script.turn_on
        target:
          entity_id: script.say
        data:
          variables:
            message: "Bonn apetitt! Steketermometeret har en temperatur på {{states('sensor.grill_1')}} grader"
      - service: script.turn_on
        target:
          entity_id: script.notifyboth
        data:
          variables:
            title: Middagen er klar!
            message: "Bonn apetitt! Steketermometeret har en temperatur på {{states('sensor.grill_1')}} grader"
