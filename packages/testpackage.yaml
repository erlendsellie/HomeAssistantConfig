testpackage:
  automation:
    - alias: lagreDagensVerdi
      trigger:
      - platform: time
        at: '23:59:00'
      action:
      - service: input_number.set_value
        data_template:
          entity_id: input_number.costyesterday
          value: '{{ sensor.daily_cost_vaskemaskin | float + input_number.running_cost_vaskemaskin | float }}'


  input_number:
    running_cost_vaskemaskin:
      name: running_cost_vaskemaskin
      min: 0
      max: 3000
      step: 0.01
      mode: box
      unit_of_measurement: 'Kr'

  sensor:
    - platform: template
      sensors:
        running_cost_vaskemaskin:
          unit_of_measurement: 'running_cost_vaskemaskin'
          value_template: >
            {{states.input_number.running_cost_vaskemaskin.state | float}}
