testpackage:
  automation:
    - alias: lagreDagensVerdi
      trigger:
      - platform: time
        at: '23:59:00'
      action:
      - service: input_number.set_value
        data_template:
          entity_id: input_number.costyesterday
          value: '{{ sensor.daily_cost_vaskemaskin | int + sensor.running_cost_vaskemaskin | int }}'


  input_number:
    costyesterday:
      name: costyesterday
      min: 0
      max: 3000
      step: 0.01
      mode: box
      unit_of_measurement: 'Kr'

  sensor:
    - platform: template
      sensors:
        yesterday_cost_caskemaskin:
          unit_of_measurement: 'Kost i går på vaskemaskin'
          value_template: >
            {{states.input_number.costyesteray.state | int}}
