template:
  - switch:
      - name: "tyra_shush"
        unique_id: tyra_shush_switch
        state: "{{ states('media_player.tyra') == 'playing' }}"
        turn_on:
          - action: script.turn_on
            data:
              entity_id: script.shush_tyra
        turn_off:
          - action: media_player.turn_off
            data:
              entity_id: media_player.tyra

script:
  shush_tyra:
    alias: Play Shushing Tyra
    sequence:
      - action: media_player.volume_set
        data:
          entity_id: media_player.tyra
          volume_level: 0.5
      - action: media_player.play_media
        target:
          entity_id: media_player.tyra
        data:
          media_content_id: https://hjem.sellie.no/local/sounds/shush.m4a
          media_content_type: music
      - delay:
          minutes: 30
      - action: media_player.volume_set
        data:
          entity_id: media_player.tyra
          volume_level: 0.0
      - action: switch.turn_off
        target:
          entity_id: switch.tyra_shush
