automation:
  - id: TelegramReply
    alias: Telegram Reply
    trigger:
      platform: event
      event_type: telegram_command
      event_data:
        command: "/garage"
    action:
      - action: script.telegram_security_notify
        data:
          message: >-
            {% if states('cover.garage_door') == "open" %}The garage is open. Do you want to close it?
            {% else %}The Garage is closed. Do you want to open it?{% endif %}
          inline_keyboard: "Open Garage:/openGarage, Close Garage:/closeGarage"

  - id: CloseGarageByTelegram
    alias: Close Garage by Telegram
    trigger:
      - platform: event
        event_type: telegram_callback
        event_data:
          data: "/closeGarage"
      - platform: event
        event_type: telegram_callback
        event_data:
          data: "/closegarage"
    action:
      - action: cover.close_cover
        target:
          entity_id: cover.garage_door
      - action: script.telegram_security_notify
        data:
          message: "Okay, i'll tell you if it won't close."
      - delay:
          seconds: 19
      - action: script.turn_on
        data:
          entity_id: >
            {% if states('cover.garage_door') == "open" %} script.garageopen
            {% else %} {% endif %}

  - id: OpenGarageByTelegram
    alias: Open Garage by Telegram
    trigger:
      - platform: event
        event_type: telegram_callback
        event_data:
          data: "/openGarage"
      - platform: event
        event_type: telegram_callback
        event_data:
          data: "/opengarage"
    action:
      - action: cover.open_cover
        target:
          entity_id: cover.garage_door
      - action: script.telegram_security_notify
        data:
          message: "Okay, I'll open the garage."

  - id: GarageRemindByTelegram
    alias: Garage Remind by Telegram
    trigger:
      - platform: event
        event_type: telegram_callback
        event_data:
          data: "/garageremind"
    action:
      - action: script.telegram_security_notify
        data:
          message: "Okay, I'll remind you in 5 minutes."
      - delay:
          minutes: 5
      - action: automation.trigger
        target:
          entity_id: automation.garageopenhtml5_p30
