automation:
  - id: CarAtStarWash
    alias: CarAtStarWash
    trigger:
      - platform: zone
        entity_id: device_tracker.modely_location_tracker
        zone: zone.starwash
        # Event is either enter or leave
        event: enter
    action:
      - action: script.turn_on
        target:
          entity_id: script.notify
        data:
          variables:
            title: Sleipner vaskes!
            message: Sleipner vaskes!
