motionsensors:
  binary_sensor:
  - platform: template
    sensors:  
      motionupstairs:
        device_class: motion
        delay_off:
          minutes: 2
        value_template: >-
          {{states.binary_sensor.motion_upstairs.state
          or states.binary_sensor.motion_bathroom.state
          or states.binary_sensor.trym_motion.state
          or states.binary_sensor.trym_motion.state
          or states.binary_sensor.motion_bedroom.state}}
      motionoffice:
        device_class: motion
        delay_off:
          minutes: 5
        value_template: >-
          {{states.binary_sensor.door_downstairs.state}}
