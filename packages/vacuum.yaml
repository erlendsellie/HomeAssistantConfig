vacuum_xiaomi:
  input_boolean:
    vacuum_just_emptied:
      name: Vacuum just emptied

  automation:
  - alias: 'cleandustbin'
    trigger:
      platform: webhook
      webhook_id: !secret cleanthedustbin
    action:
    - service: homeassistant.turn_on
      entity_id: input_boolean.cleandustbin

  - alias: SendToKitchen
    trigger:
    - platform: state
      entity_id: binary_sensor.motion_kitchen
      to: 'on'
    condition:
      condition: and
      conditions:
      - condition: time
        weekday:
        - mon
        - thu
        - sat
      - condition: state
        entity_id: input_boolean.vacuum_just_emptied
        state: 'off'      
      - condition: template
        value_template: "{{ states.input_select.alarm.state  == 'Disarm'}}"
    action:
      - service: vacuum.stop
        entity_id: vacuum.xiaomi_vacuum_cleaner
      - service: vacuum.send_command
        data:
          entity_id: vacuum.xiaomi_vacuum_cleaner
          command: app_goto_target
          params: [25000,32800]  
      - service: homeassistant.turn_on
        entity_id: input_boolean.vacuum_just_emptied
      - service: script.turn_on
        entity_id: script.say
        data_template:
            message: 'Tøm Svetlana.'

  - alias: VaccumJustEmptiedNot
    trigger:
      - platform: time
        at: 13:00:00
    condition:
      - condition: state
        entity_id: input_boolean.vacuum_just_emptied
        state: 'on'      
    action:
    - service: homeassistant.turn_off
      entity_id: input_boolean.vacuum_just_emptied

