        priority: high        


notify:
  alias: Simple Notification
  sequence:
  - service: notify.mobile_app_erlend_app
    data_template:
      title: '{{title}}'
      message: '{{message}}'
      data:
        ttl: 0
        priority: high

notifycaroline:
  alias: Simple Notification to Caroline
  sequence:
  - service: notify.mobile_app_caroline
    data_template:
      title: '{{title}}'
      message: '{{message}}'
      data:
        ttl: 0
        priority: high


shush_tyra:
  alias: Play Shushing Tyra
  sequence:
    - service: media_player.volume_set
      data_template:
        entity_id: media_player.tyra
        volume_level: 0.5
    - service: media_player.play_media 
      entity_id: media_player.tyra
      data:
        media_content_id: https://sivert.duckdns.org/local/sounds/shush.mp3
        media_content_type: music    
    - delay:
        minutes: 30
    - service: media_player.volume_set
      data_template:
        entity_id: media_player.tyra
        volume_level: 0.0
    - service: media_player.turn_off
      entity_id: media_player.tyra
    - service: script.turn_off
      entity_id: script.shush_tyra
      



say:
  alias: Announcement over Google Homes
  sequence:
  - condition: template
    value_template: "{{ (states.media_player.living_room_speaker.state != 'playing' and states.media_player.hallway_speaker.state != 'playing') and states.media_player.living_room_speaker.state != 'paused' and states.media_player.hallway_speaker.state != 'paused'}}"
  # - condition: template
 #   value_template: "{{ states.media_player.minis.state != 'playing'}}"
  - service: media_player.volume_set
    data_template:
      entity_id: media_player.minis
      volume_level: "{{states.sensor.speakervolume.state}}"
  - service: tts.google_say
    entity_id: media_player.minis
    data_template:
      message: '{{message}}'
  - delay:
      seconds: 10
  # - service: media_player.volume_set
  #   data_template:
  #     entity_id: media_player.minis
  #     volume_level: "{{states.input_number.default_volume_level.state}}"


notifymotionshield:
  alias: Notify When Motion Outside On Shield
  sequence:
    - condition: template
      value_template: "{{states.media_player.nvidia_shield.state != 'off'}}"
    # - service: notify.shield_gentle 
    #   data_template:
    #     message: 'Motion Outside'
    #     title: 'Motion Outside'
    #     data:
    #       file:
    #         url: https://sivert.duckdns.org{{states.camera.driveway.attributes.entity_picture}}
blinkliving:
  alias: Blink Lights in livingroom
  sequence:
  - condition: template
    value_template: "{{ states.input_select.alarm.state  == 'Disarm'}}"
  - service: light.turn_on
    entity_id: group.colorlightsliving
    data:
      color_name: '{{color}}'
  - delay:
      seconds: 5
  - service: light.turn_off
    entity_id: group.colorlightsliving
  - delay:
      seconds: 2    
  - service: light.turn_on
    entity_id: group.colorlightsliving
    data:
      color_name: '{{color}}'  
  - delay:
      seconds: 5
  - service: homeassistant.turn_on
    entity_id: script.restorelightcolor  


requestlocation:
  alias: Request Location
  sequence:
  - service: notify.mobile_app_caroline
    data:
      message: "request_location_update"
  - service: notify.mobile_app_erlend_app
    data:
      message: "request_location_update"


turnoffupstairslights:
  alias: Turn off upstairs lights
  sequence:
    - condition: template
      value_template: "{{ states.binary_sensor.motion_upstairs.state == 'off'}}"
    - service: light.turn_off
      entity_id: light.upstairs


turnoffhallwaylights:
  alias: Turn off hallway lights
  sequence:
    - condition: template
      value_template: "{{ states.binary_sensor.motion_hallway.state == 'off'}}"
    - service: light.turn_off
      entity_id: light.hallway


turnoffvindfanglights:
  alias: Turn off vindfang lights
  sequence:
  - condition: template
    value_template: "{{ states.binary_sensor.motion_vindfang.state == 'off'}}"
  - service: light.turn_off
    entity_id: light.vindfang      

restart:
  alias: 'Restart'
  sequence:
  - service: homeassistant.restart

reloadstuff:
  alias: 'Reload Stuff'
  variables:
    washer_emptied: input_boolean.turn_on
  sequence:
  - variables:
      washer_emptied: >-
        {% if states.input_boolean.washer_emptied.state == 'on' %}
        input_boolean.turn_on
        {% else %}
        input_boolean.turn_off
        {% endif %}
  - service: template.reload
  - service: homeassistant.reload_core_config
  - service: zone.reload
  - service: automation.reload
  - service: script.reload
  - delay:  
      seconds: 30
  - service: "{{ washer_emptied }}"
    entity_id: input_boolean.washer_emptied
  

reload:
  alias: 'Reload HA'
  sequence:
  - service: homeassistant.reload_core_config