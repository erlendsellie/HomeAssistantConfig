  - platform: generic_thermostat
    name: Toilet Heater
    heater: switch.toilet_heater
    target_sensor: sensor.toilet_temp
    min_temp: 16
    max_temp: 26
    hot_tolerance: 0.5
    keep_alive:
      minutes: 30


  - platform: generic_thermostat
    name: Garage Heater
    heater: switch.garage_heater
    target_sensor: sensor.garage_temperature
    min_temp: 0
    max_temp: 14
    hot_tolerance: 0.5
    keep_alive:
      minutes: 30



  - platform: generic_thermostat
    name: Office Heater
    heater: switch.office_heater
    target_sensor: sensor.office_temp_temperature
    min_temp: 14
    max_temp: 26
    hot_tolerance: 0.5
    keep_alive:
      minutes: 30


      
