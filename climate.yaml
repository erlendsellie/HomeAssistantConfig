  - platform: smartir
    name: Varmepumpe
    device_code: 1023
    unique_id: living_ac
    #controller_send_service: switch.broadlink_send_packet_192_168_1_239
    controller_data: remote.broadlink_remote
    temperature_sensor: sensor.stua_temperature
    humidity_sensor: sensor.stua_humidity
